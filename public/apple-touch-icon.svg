<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1220"/>
      <stop offset="100%" stop-color="#080b12"/>
    </linearGradient>
    <linearGradient id="gemGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3d7eff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6b9fff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3d7eff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3d7eff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3d7eff" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background with rounded corners (iOS clips to rounded rect automatically, but safe to include) -->
  <rect width="180" height="180" rx="38" fill="url(#bgGrad)"/>

  <!-- Subtle glow in center -->
  <circle cx="90" cy="90" r="80" fill="url(#glow)"/>

  <!-- Outer ring decoration -->
  <circle cx="90" cy="90" r="68" fill="none" stroke="#1f2d47" stroke-width="1" opacity="0.8"/>
  <circle cx="90" cy="90" r="72" fill="none" stroke="#3d7eff" stroke-width="0.5" opacity="0.3"/>

  <!-- Gem background block -->
  <rect x="48" y="48" width="84" height="84" rx="20" fill="url(#gemGrad)" filter="url(#softShadow)"/>

  <!-- Inner gem highlight -->
  <rect x="48" y="48" width="84" height="84" rx="20" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Hexagon symbol — ⬡ drawn as a path -->
  <!-- Regular hexagon centered at 90,90, radius ~28 -->
  <path d="M90 62 L114 76 L114 104 L90 118 L66 104 L66 76 Z"
        fill="none"
        stroke="white"
        stroke-width="3.5"
        stroke-linejoin="round"
        opacity="0.95"/>

  <!-- Inner dot -->
  <circle cx="90" cy="90" r="6" fill="white" opacity="0.9"/>

  <!-- Small accent dots at corners -->
  <circle cx="48" cy="48" r="3" fill="#3d7eff" opacity="0.5"/>
  <circle cx="132" cy="48" r="3" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="48" cy="132" r="3" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="132" cy="132" r="3" fill="#3d7eff" opacity="0.5"/>
</svg>
