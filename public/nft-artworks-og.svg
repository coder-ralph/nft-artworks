<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080b12"/>
      <stop offset="100%" stop-color="#0d1220"/>
    </linearGradient>

    <!-- Accent blue glow -->
    <radialGradient id="glowBlue" cx="50%" cy="40%" r="55%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3d7eff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3d7eff" stop-opacity="0"/>
    </radialGradient>

    <!-- Purple glow -->
    <radialGradient id="glowPurple" cx="80%" cy="20%" r="40%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>

    <!-- Card gradient -->
    <linearGradient id="cardGrad1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1e2a3f"/>
      <stop offset="100%" stop-color="#161f30"/>
    </linearGradient>

    <!-- ETH badge gradient -->
    <linearGradient id="ethGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#627eea"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Logo gem gradient -->
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3d7eff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Card image fill gradients (simulated artwork thumbnails) -->
    <linearGradient id="art1" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1a1060"/>
      <stop offset="50%" stop-color="#3d2090"/>
      <stop offset="100%" stop-color="#0d2060"/>
    </linearGradient>
    <linearGradient id="art2" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0a2a1a"/>
      <stop offset="50%" stop-color="#0e5c30"/>
      <stop offset="100%" stop-color="#1a3a10"/>
    </linearGradient>
    <linearGradient id="art3" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2a0a0a"/>
      <stop offset="50%" stop-color="#7a1c1c"/>
      <stop offset="100%" stop-color="#3a1060"/>
    </linearGradient>

    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="card1clip"><rect width="220" height="260" rx="14"/></clipPath>
    <clipPath id="card2clip"><rect width="220" height="260" rx="14"/></clipPath>
    <clipPath id="card3clip"><rect width="220" height="260" rx="14"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glowBlue)"/>
  <rect width="1200" height="630" fill="url(#glowPurple)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#3d7eff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- ── LEFT SIDE: Branding ── -->

  <!-- Logo gem -->
  <rect x="72" y="100" width="52" height="52" rx="13" fill="url(#logoGrad)" opacity="0.95"/>
  <text x="98" y="133" text-anchor="middle" font-size="26" fill="white" font-family="sans-serif">⬡</text>

  <!-- Glow ring behind gem -->
  <rect x="72" y="100" width="52" height="52" rx="13" fill="none" stroke="#3d7eff" stroke-width="1" opacity="0.5"/>

  <!-- App name -->
  <text x="72" y="210" font-family="'Syne', 'Arial Black', sans-serif" font-weight="800" font-size="56" fill="#e8edf5" letter-spacing="-2">NFT Artworks</text>

  <!-- Tagline -->
  <text x="74" y="258" font-family="'DM Mono', 'Courier New', monospace" font-size="18" fill="#8fa3c0" letter-spacing="0.5">Upload · Pin · Display on IPFS</text>

  <!-- Description -->
  <foreignObject x="72" y="286" width="500" height="80">
    <body xmlns="http://www.w3.org/1999/xhtml">
      <p style="margin:0; font-family:Arial,sans-serif; font-size:17px; color:#6b8aaa; line-height:1.6;">A modern Web3 gallery for uploading and<br/>exploring NFT artwork stored on IPFS.</p>
    </body>
  </foreignObject>

  <!-- Live badge -->
  <rect x="72" y="390" width="190" height="34" rx="17" fill="#161f30" stroke="#2a3d5c" stroke-width="1"/>
  <circle cx="94" cy="407" r="5" fill="#22c55e"/>
  <text x="107" y="413" font-family="'DM Mono', monospace" font-size="12" fill="#8fa3c0" letter-spacing="1">IPFS · ERC-721 READY</text>

  <!-- Tech badges -->
  <rect x="72" y="444" width="72" height="26" rx="6" fill="#1e2a3f" stroke="#2a3d5c" stroke-width="1"/>
  <text x="108" y="461" text-anchor="middle" font-family="monospace" font-size="11" fill="#6b9fff">React</text>

  <rect x="154" y="444" width="72" height="26" rx="6" fill="#1e2a3f" stroke="#2a3d5c" stroke-width="1"/>
  <text x="190" y="461" text-anchor="middle" font-family="monospace" font-size="11" fill="#6b9fff">Vite</text>

  <rect x="236" y="444" width="90" height="26" rx="6" fill="#1e2a3f" stroke="#2a3d5c" stroke-width="1"/>
  <text x="281" y="461" text-anchor="middle" font-family="monospace" font-size="11" fill="#6b9fff">Pinata V3</text>

  <rect x="336" y="444" width="90" height="26" rx="6" fill="#1e2a3f" stroke="#2a3d5c" stroke-width="1"/>
  <text x="381" y="461" text-anchor="middle" font-family="monospace" font-size="11" fill="#6b9fff">Tailwind</text>

  <!-- Author -->
  <text x="74" y="542" font-family="'DM Mono', monospace" font-size="13" fill="#4d6480">by Ralph Rosael</text>

  <!-- Vertical divider -->
  <line x1="600" y1="60" x2="600" y2="570" stroke="#1f2d47" stroke-width="1"/>

  <!-- ── RIGHT SIDE: NFT Card Mockups ── -->

  <!-- Card 1 (center, prominent) -->
  <g transform="translate(638, 55)" filter="url(#cardShadow)">
    <rect width="220" height="260" rx="14" fill="#161f30" stroke="#2a3d5c" stroke-width="1"/>
    <!-- Art thumbnail -->
    <rect width="220" height="158" rx="14" fill="url(#art1)" clip-path="url(#card1clip)"/>
    <rect y="144" width="220" height="14" rx="0" fill="url(#art1)" opacity="0.6"/>
    <!-- Geometric art elements inside card 1 -->
    <circle cx="110" cy="79" r="42" fill="none" stroke="#6b4fff" stroke-width="1.5" opacity="0.6"/>
    <circle cx="110" cy="79" r="28" fill="none" stroke="#3d7eff" stroke-width="1" opacity="0.5"/>
    <polygon points="110,46 138,95 82,95" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
    <circle cx="110" cy="79" r="8" fill="#3d7eff" opacity="0.8"/>
    <!-- Category badge -->
    <rect x="10" y="10" width="42" height="20" rx="5" fill="rgba(8,11,18,0.75)"/>
    <text x="31" y="24" text-anchor="middle" font-family="monospace" font-size="9" fill="#8fa3c0">ART</text>
    <!-- Card body -->
    <text x="14" y="186" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#e8edf5">Cosmic Void #001</text>
    <text x="14" y="204" font-family="monospace" font-size="10" fill="#4d6480">Abstract digital art</text>
    <!-- Divider -->
    <line x1="14" y1="218" x2="206" y2="218" stroke="#1f2d47" stroke-width="1"/>
    <!-- Price -->
    <circle cx="25" cy="238" r="8" fill="url(#ethGrad)"/>
    <text x="25" y="242" text-anchor="middle" font-family="monospace" font-size="8" fill="white" font-weight="700">Ξ</text>
    <text x="40" y="242" font-family="monospace" font-size="12" font-weight="700" fill="#e8edf5">0.4500</text>
    <text x="88" y="242" font-family="monospace" font-size="10" fill="#4d6480">ETH</text>
    <text x="150" y="242" font-family="monospace" font-size="10" fill="#4d6480">Mar 2026</text>
  </g>

  <!-- Card 2 (left, slightly rotated back) -->
  <g transform="translate(490, 130) rotate(-6, 110, 130)" filter="url(#cardShadow)" opacity="0.75">
    <rect width="200" height="240" rx="14" fill="#161f30" stroke="#1f2d47" stroke-width="1"/>
    <rect width="200" height="144" rx="14" fill="url(#art2)" clip-path="url(#card2clip)"/>
    <rect y="130" width="200" height="14" fill="url(#art2)" opacity="0.4"/>
    <!-- Art elements -->
    <rect x="20" y="20" width="160" height="104" rx="6" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
    <line x1="20" y1="72" x2="180" y2="72" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
    <circle cx="100" cy="62" r="22" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
    <circle cx="100" cy="62" r="10" fill="#22c55e" opacity="0.3"/>
    <rect x="10" y="10" width="56" height="20" rx="5" fill="rgba(8,11,18,0.75)"/>
    <text x="38" y="24" text-anchor="middle" font-family="monospace" font-size="9" fill="#8fa3c0">GAMING</text>
    <text x="14" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#e8edf5">Pixel Realm #7</text>
    <line x1="14" y1="196" x2="186" y2="196" stroke="#1f2d47" stroke-width="1"/>
    <circle cx="24" cy="216" r="7" fill="url(#ethGrad)"/>
    <text x="24" y="220" text-anchor="middle" font-family="monospace" font-size="7" fill="white" font-weight="700">Ξ</text>
    <text x="38" y="220" font-family="monospace" font-size="11" font-weight="700" fill="#e8edf5">0.0750</text>
    <text x="80" y="220" font-family="monospace" font-size="9" fill="#4d6480">ETH</text>
  </g>

  <!-- Card 3 (right, slightly rotated) -->
  <g transform="translate(888, 110) rotate(5, 110, 130)" filter="url(#cardShadow)" opacity="0.75">
    <rect width="200" height="240" rx="14" fill="#161f30" stroke="#1f2d47" stroke-width="1"/>
    <rect width="200" height="144" rx="14" fill="url(#art3)" clip-path="url(#card3clip)"/>
    <rect y="130" width="200" height="14" fill="url(#art3)" opacity="0.4"/>
    <!-- Art elements -->
    <circle cx="100" cy="72" r="40" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
    <circle cx="100" cy="72" r="24" fill="none" stroke="#f87171" stroke-width="1.5" opacity="0.5"/>
    <polygon points="100,48 120,88 80,88" fill="#ef4444" opacity="0.2"/>
    <polygon points="100,48 120,88 80,88" fill="none" stroke="#fca5a5" stroke-width="1" opacity="0.5"/>
    <rect x="10" y="10" width="46" height="20" rx="5" fill="rgba(8,11,18,0.75)"/>
    <text x="33" y="24" text-anchor="middle" font-family="monospace" font-size="9" fill="#8fa3c0">MUSIC</text>
    <text x="14" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#e8edf5">Neon Wave #12</text>
    <line x1="14" y1="196" x2="186" y2="196" stroke="#1f2d47" stroke-width="1"/>
    <circle cx="24" cy="216" r="7" fill="url(#ethGrad)"/>
    <text x="24" y="220" text-anchor="middle" font-family="monospace" font-size="7" fill="white" font-weight="700">Ξ</text>
    <text x="38" y="220" font-family="monospace" font-size="11" font-weight="700" fill="#e8edf5">0.1200</text>
    <text x="80" y="220" font-family="monospace" font-size="9" fill="#4d6480">ETH</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#logoGrad)" opacity="0.6"/>

  <!-- Bottom label -->
  <text x="600" y="596" text-anchor="middle" font-family="'DM Mono', monospace" font-size="13" fill="#2a3d5c">nft-artworks.vercel.app</text>
</svg>
